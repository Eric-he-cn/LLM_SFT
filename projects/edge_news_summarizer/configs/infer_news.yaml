### Model
model_name_or_path: Qwen/Qwen2.5-3B-Instruct  # 基座模型路径
adapter_name_or_path: projects/edge_news_summarizer/outputs/checkpoints/qwen25-3b-qlora-news  # LoRA adapter 路径

### Method
stage: sft
do_predict: true
finetuning_type: lora

### Dataset
dataset: news_structured_summary
template: qwen
cutoff_len: 1024

### Output
output_dir: projects/edge_news_summarizer/outputs/eval
per_device_eval_batch_size: 2
predict_with_generate: true
fp16: true

### Generation
max_new_tokens: 512
temperature: 0.1
top_p: 0.9
